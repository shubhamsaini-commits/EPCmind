<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">EPCmind animated architecture</title>
  <desc id="desc">An animated dark diagram showing project documents flowing through extraction, chunking, vector search, grounded answers, and compliance checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.5" stop-color="#0b0d14"/>
      <stop offset="1" stop-color="#06080d"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.42" stop-color="#c4b5fd"/>
      <stop offset="0.72" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="violetGlow">
      <stop offset="0" stop-color="#7c3aed" stop-opacity=".34"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity=".23"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#94a3b8" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <path id="p1" d="M205 316 H262"/>
    <path id="p2" d="M407 316 H464"/>
    <path id="p3" d="M609 316 H666"/>
    <path id="pAsk" d="M811 304 C846 304 846 276 875 276"/>
    <path id="pCheck" d="M811 328 C846 328 846 366 875 366"/>
  </defs>

  <rect width="1200" height="460" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="458" rx="25" fill="none" stroke="#64748b" stroke-opacity=".35"/>
  <rect width="1200" height="460" rx="26" fill="url(#grid)"/>
  <circle cx="220" cy="80" r="250" fill="url(#violetGlow)">
    <animate attributeName="opacity" values=".55;.9;.55" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1040" cy="280" r="280" fill="url(#cyanGlow)">
    <animate attributeName="opacity" values=".9;.45;.9" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(70 44)">
      <rect width="182" height="30" rx="15" fill="#161923" stroke="#8b5cf6" stroke-opacity=".62"/>
      <circle cx="17" cy="15" r="4" fill="#a78bfa" filter="url(#softGlow)">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="31" y="20" fill="#ddd6fe" font-size="11" font-weight="700" letter-spacing="1.4">AI INTELLIGENCE LAYER</text>
    </g>
    <g transform="translate(965 44)">
      <rect width="165" height="30" rx="15" fill="#111b1d" stroke="#2dd4bf" stroke-opacity=".45"/>
      <text x="18" y="20" fill="#99f6e4" font-size="11" font-weight="700" letter-spacing="1.2">DATA CENTRE EPC</text>
    </g>

    <text x="70" y="150" fill="url(#titleGradient)" font-size="72" font-weight="800" letter-spacing="-3">EPCmind</text>
    <text x="72" y="190" fill="#e2e8f0" font-size="22" font-weight="600">Ask the project. Verify the submittal. Catch the deviation.</text>
    <text x="72" y="220" fill="#94a3b8" font-size="15">Turning scattered project documents into a living intelligence layer.</text>

    <g opacity=".9">
      <path d="M205 316 H262 M407 316 H464 M609 316 H666" stroke="#64748b" stroke-width="2"/>
      <path d="M811 304 C846 304 846 276 875 276 M811 328 C846 328 846 366 875 366" fill="none" stroke="#64748b" stroke-width="2"/>
    </g>

    <g filter="url(#cardShadow)">
      <g transform="translate(70 276)">
        <rect width="135" height="80" rx="13" fill="#22242a" stroke="#858893"/>
        <text x="67.5" y="32" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">Documents</text>
        <text x="67.5" y="56" text-anchor="middle" fill="#a5abb5" font-size="12">PDF · DOCX · XLSX</text>
      </g>
      <g transform="translate(262 276)">
        <rect width="145" height="80" rx="13" fill="#102c50" stroke="#3b82f6"/>
        <text x="72.5" y="32" text-anchor="middle" fill="#dbeafe" font-size="15" font-weight="700">Extract</text>
        <text x="72.5" y="56" text-anchor="middle" fill="#93c5fd" font-size="12">format-aware</text>
      </g>
      <g transform="translate(464 276)">
        <rect width="145" height="80" rx="13" fill="#102c50" stroke="#3b82f6"/>
        <text x="72.5" y="32" text-anchor="middle" fill="#dbeafe" font-size="15" font-weight="700">Chunk</text>
        <text x="72.5" y="56" text-anchor="middle" fill="#93c5fd" font-size="12">context-preserved</text>
      </g>
      <g transform="translate(666 276)">
        <rect width="145" height="80" rx="13" fill="#073d36" stroke="#14b8a6"/>
        <text x="72.5" y="32" text-anchor="middle" fill="#ccfbf1" font-size="15" font-weight="700">Vector DB</text>
        <text x="72.5" y="56" text-anchor="middle" fill="#5eead4" font-size="12">Gemini + ChromaDB</text>
      </g>
      <g transform="translate(875 238)">
        <rect width="255" height="76" rx="13" fill="#2d256d" stroke="#8b5cf6"/>
        <text x="20" y="31" fill="#ede9fe" font-size="15" font-weight="700">Ask Documents</text>
        <text x="20" y="54" fill="#c4b5fd" font-size="12">grounded answer + citations</text>
        <circle cx="226" cy="38" r="12" fill="#7c3aed" opacity=".65">
          <animate attributeName="opacity" values=".35;1;.35" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <path d="M222 38h8m-4-4v8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
      </g>
      <g transform="translate(875 328)">
        <rect width="255" height="76" rx="13" fill="#602412" stroke="#f97316"/>
        <text x="20" y="31" fill="#ffedd5" font-size="15" font-weight="700">Compliance Check</text>
        <text x="20" y="54" fill="#fdba74" font-size="12">match · deviation · severity</text>
        <circle cx="226" cy="38" r="12" fill="#ea580c" opacity=".65">
          <animate attributeName="opacity" values="1;.35;1" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <path d="M220 38l4 4 8-9" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <g fill="#60a5fa" filter="url(#softGlow)">
      <circle r="4"><animateMotion dur="1.7s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
      <circle r="4"><animateMotion dur="1.7s" begin=".55s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
      <circle r="4"><animateMotion dur="1.7s" begin="1.1s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle>
    </g>
    <circle r="4" fill="#a78bfa" filter="url(#softGlow)">
      <animateMotion dur="2s" begin=".35s" repeatCount="indefinite"><mpath href="#pAsk"/></animateMotion>
    </circle>
    <circle r="4" fill="#fb923c" filter="url(#softGlow)">
      <animateMotion dur="2s" begin="1.1s" repeatCount="indefinite"><mpath href="#pCheck"/></animateMotion>
    </circle>

    <g transform="translate(72 416)" fill="#64748b" font-size="11" letter-spacing="1">
      <text>RAG</text><circle cx="42" cy="-4" r="2" fill="#475569"/>
      <text x="54">CITED ANSWERS</text><circle cx="157" cy="-4" r="2" fill="#475569"/>
      <text x="169">REQUIREMENT-LEVEL COMPLIANCE</text>
    </g>
  </g>
</svg>
